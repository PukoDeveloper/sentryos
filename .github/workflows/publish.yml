name: Publish to npm

on:
  # 手動觸發，可選擇要發布哪些套件及指定版本號
  workflow_dispatch:
    inputs:
      version:
        description: '要發布的版本號（例如：1.2.3），留空則使用各套件現有版本'
        required: false
        default: ''
      packages:
        description: '要發布的套件（逗號分隔：sentryos, sdk, create-sentryos）'
        required: false
        default: 'sentryos,sdk,create-sentryos'
  # 推送 v* tag 時自動全部發布
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 版本號解析與更新 ──────────────────────────────────────────────────────
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # 從 tag 中移除前置 'v'（例如 v1.2.3 → 1.2.3）
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Bump all package versions
        if: steps.version.outputs.version != ''
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # 自動探索 apps/ 與 packages/ 下的所有 package.json（排除 node_modules）
          while IFS= read -r PKG; do
            node -e "
              const fs = require('fs');
              try {
                const pkg = JSON.parse(fs.readFileSync('${PKG}', 'utf8'));
                pkg.version = process.env.VERSION;
                fs.writeFileSync('${PKG}', JSON.stringify(pkg, null, 2) + '\n');
                console.log('Updated ${PKG} to ' + process.env.VERSION);
              } catch (err) {
                console.error('Failed to update ${PKG}:', err.message);
                process.exit(1);
              }
            "
          done < <(find apps packages -name 'package.json' -not -path '*/node_modules/*')

      # ── sentryos-sdk ─────────────────────────────────────────────────────────
      - name: Build sentryos-sdk
        if: >
          github.event_name == 'push' ||
          contains(format(',{0},', github.event.inputs.packages), ',sdk,') ||
          contains(format(',{0},', github.event.inputs.packages), ',sentryos,')
        run: pnpm --filter sentryos-sdk build

      - name: Publish sentryos-sdk
        if: >
          github.event_name == 'push' ||
          contains(format(',{0},', github.event.inputs.packages), ',sdk,')
        working-directory: packages/sdk
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── sentryos（本體）─────────────────────────────────────────────────────
      - name: Build sentryos plugins
        if: >
          github.event_name == 'push' ||
          contains(format(',{0},', github.event.inputs.packages), ',sentryos,')
        run: pnpm --filter 'sentryos-plugin-*' --parallel build

      - name: Build sentryos
        if: >
          github.event_name == 'push' ||
          contains(format(',{0},', github.event.inputs.packages), ',sentryos,')
        run: pnpm --filter sentryos build:lib

      - name: Publish sentryos
        if: >
          github.event_name == 'push' ||
          contains(format(',{0},', github.event.inputs.packages), ',sentryos,')
        working-directory: apps/sentryos
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── create-sentryos ───────────────────────────────────────────────────────
      # create-sentryos 是純 Node.js CLI 腳本（index.js），無需編譯，直接發布即可。
      - name: Publish create-sentryos
        if: >
          github.event_name == 'push' ||
          contains(format(',{0},', github.event.inputs.packages), ',create-sentryos,')
        working-directory: packages/sentryos-create
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
