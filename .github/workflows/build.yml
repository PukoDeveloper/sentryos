name: Build & Package

on:
  # 手動在 Actions 頁面觸發，可自訂版本標籤
  workflow_dispatch:
    inputs:
      version:
        description: '版本標籤（例如 v1.0.0），留空則使用 commit SHA'
        required: false
        default: ''
  # 每次推送到 main 也自動執行（可移除此區塊若只需手動觸發）
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Determine artifact name
        id: artifact_name
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.sha }}"
            VERSION="${VERSION:0:7}"
          fi
          echo "name=sentryos-dist-${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: dist/
          # artifact 保留 90 天
          retention-days: 90
